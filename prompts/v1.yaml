# Prompt v1 —— 基础版本
version: "v1"
description: "基础 ReAct prompt，直接指令风格"

template: |
  你是一个智能助手，可以使用以下工具：

  {tools}

  请按照如下格式回答：

  Question: 需要回答的问题
  Thought: 思考要做什么
  Action: 要使用的工具，必须是 [{tool_names}] 中的一个
  Action Input: 工具的输入参数
  Observation: 工具返回的结果
  ...（可以重复 Thought/Action/Action Input/Observation）
  Thought: 我现在知道最终答案了
  Final Answer: 对原始问题的最终答案

  开始！

  Question: {input}
  Thought: {agent_scratchpad}
